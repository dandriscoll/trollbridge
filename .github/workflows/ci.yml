name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go version
        run: go version

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      # Race detector (#208). Linux-only: the ubuntu runner has a
      # reliable cgo toolchain for -race, and data races are logic bugs
      # that surface identically across OSes, so one lane is the right
      # scope. Covers the whole module — internal/approvals (whose whole
      # purpose is concurrent hold resolution) and its neighbors. The
      # race detector requires cgo, so this step overrides the
      # job-level CGO_ENABLED=0.
      - name: go test (-race)
        if: matrix.os == 'ubuntu-latest'
        env:
          CGO_ENABLED: "1"
        run: go test -race ./...

      # e2e tests build and exercise the trollbridge binary as a
      # subprocess. All three OS lanes are required: Windows and
      # macOS were promoted from scratch (continue-on-error) to
      # required after observed-green in CI runs 26622939588
      # (macOS) and 26690830932 (Windows post the binname + audit-
      # init test portability fixes — closes #163). Linux-only
      # tests use `//go:build linux` build tags on their files
      # (e.g. internal/tui/*_pty_subprocess_test.go); files without
      # an OS-narrowing tag must run on every OS.
      - name: go test (e2e)
        run: go test -tags=e2e ./...

      # Hardcoded-model-string lint (#155). Linux only — the check
      # is shell-script-based and would behave identically on every
      # runner; one lane is the right scope.
      - name: lint hardcoded model strings
        if: matrix.os == 'ubuntu-latest'
        run: scripts/check-model-strings.sh

      # Markdown doc-link gate (#151). Validates every relative
      # markdown link across the repo's *.md files; catches dead
      # cross-doc references that accumulate silently. Linux only;
      # the check is python3-based and identical on every runner.
      - name: check doc links
        if: matrix.os == 'ubuntu-latest'
        run: scripts/check-doc-links.sh

  # Noexec-TMPDIR updater lane (#212). The updater runs its downloaded
  # helper via `bash <file>` precisely so it survives a /tmp mounted
  # noexec (bash READS the script; no exec bit / PROT_EXEC needed). The
  # contract test TestRunWithPrefix_NoexecTmpdirSurvives self-mounts a
  # noexec tmpfs and asserts the pipeline succeeds — but it SKIPS unless
  # euid==0 (mounting needs CAP_SYS_ADMIN), so the unprivileged `validate`
  # lanes compile it but never run it. This lane runs the updater tests
  # AS ROOT so the noexec path executes for real; a refactor to
  # direct-exec would then fail here instead of silently regressing (the
  # class has shipped twice — the #94/#163 lineage, #205).
  #
  # Split: compile the test binary as the normal user (Go toolchain and
  # module cache stay unprivileged; no root-owned cache, no sudo PATH/
  # GOROOT gymnastics), then run the precompiled binary under sudo. The
  # binary lands in the workspace (not /tmp) so it is never on a noexec
  # mount. Linux-only: the noexec mount + euid gating are a Linux
  # contract (same scoping rationale as the -race lane).
  noexec-updater:
    name: updater (noexec TMPDIR, root)
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: compile updater test binary (unprivileged)
        run: go test -c -o updater.test ./internal/updater

      - name: run updater tests as root under noexec TMPDIR
        run: |
          set -euo pipefail
          sudo ./updater.test -test.v 2>&1 | tee updater.out
          # A SKIP reports green, which would defeat the lane's purpose:
          # require the noexec contract test to have actually PASSed
          # (euid==0 cleared the skip, the mount succeeded, bash ran).
          if ! grep -q '^--- PASS: TestRunWithPrefix_NoexecTmpdirSurvives' updater.out; then
            echo "::error::TestRunWithPrefix_NoexecTmpdirSurvives did not PASS (it skipped or failed); the noexec lane must exercise real execution"
            exit 1
          fi
