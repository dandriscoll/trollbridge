name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go version
        run: go version

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      # Race detector (#208). Linux-only: the ubuntu runner has a
      # reliable cgo toolchain for -race, and data races are logic bugs
      # that surface identically across OSes, so one lane is the right
      # scope. Covers the whole module — internal/approvals (whose whole
      # purpose is concurrent hold resolution) and its neighbors. The
      # race detector requires cgo, so this step overrides the
      # job-level CGO_ENABLED=0.
      - name: go test (-race)
        if: matrix.os == 'ubuntu-latest'
        env:
          CGO_ENABLED: "1"
        run: go test -race ./...

      # e2e tests build and exercise the trollbridge binary as a
      # subprocess. All three OS lanes are required: Windows and
      # macOS were promoted from scratch (continue-on-error) to
      # required after observed-green in CI runs 26622939588
      # (macOS) and 26690830932 (Windows post the binname + audit-
      # init test portability fixes — closes #163). Linux-only
      # tests use `//go:build linux` build tags on their files
      # (e.g. internal/tui/*_pty_subprocess_test.go); files without
      # an OS-narrowing tag must run on every OS.
      - name: go test (e2e)
        run: go test -tags=e2e ./...

      # Hardcoded-model-string lint (#155). Linux only — the check
      # is shell-script-based and would behave identically on every
      # runner; one lane is the right scope.
      - name: lint hardcoded model strings
        if: matrix.os == 'ubuntu-latest'
        run: scripts/check-model-strings.sh

      # Markdown doc-link gate (#151). Validates every relative
      # markdown link across the repo's *.md files; catches dead
      # cross-doc references that accumulate silently. Linux only;
      # the check is python3-based and identical on every runner.
      - name: check doc links
        if: matrix.os == 'ubuntu-latest'
        run: scripts/check-doc-links.sh
