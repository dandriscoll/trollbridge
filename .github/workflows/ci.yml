name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go version
        run: go version

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      # e2e tests build and exercise the trollbridge binary as a
      # subprocess. Linux is the canonical lane (the suite is
      # verified there). Windows/macOS run an `continue-on-error`
      # scratch lane below to surface what fixing the suite there
      # would require — promotion to the canonical matrix is gated
      # on observed-green at least once (#163).
      - name: go test (e2e)
        if: matrix.os == 'ubuntu-latest'
        run: go test -tags=e2e ./...

      - name: go test (e2e, scratch — Windows/macOS, #163)
        if: matrix.os != 'ubuntu-latest'
        continue-on-error: true
        run: go test -tags=e2e ./...

      # Hardcoded-model-string lint (#155). Linux only — the check
      # is shell-script-based and would behave identically on every
      # runner; one lane is the right scope.
      - name: lint hardcoded model strings
        if: matrix.os == 'ubuntu-latest'
        run: scripts/check-model-strings.sh

      # Markdown doc-link gate (#151). Validates every relative
      # markdown link across the repo's *.md files; catches dead
      # cross-doc references that accumulate silently. Linux only;
      # the check is python3-based and identical on every runner.
      - name: check doc links
        if: matrix.os == 'ubuntu-latest'
        run: scripts/check-doc-links.sh
