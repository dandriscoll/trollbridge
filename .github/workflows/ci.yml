name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go version
        run: go version

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      # e2e tests build and exercise the trollbridge binary as a
      # subprocess. Linux-only for now: the suite is verified there,
      # not yet on the Windows/macOS runners (#124). Extending it to
      # the full matrix is a tracked follow-up.
      - name: go test (e2e)
        if: matrix.os == 'ubuntu-latest'
        run: go test -tags=e2e ./...

      # Hardcoded-model-string lint (#155). Linux only — the check
      # is shell-script-based and would behave identically on every
      # runner; one lane is the right scope.
      - name: lint hardcoded model strings
        if: matrix.os == 'ubuntu-latest'
        run: scripts/check-model-strings.sh
