# trollbridge example configuration (schema v3).
#
# Organized around the four operator decisions:
#   1. binds — per-surface listen addresses (proxy / control / metrics)
#   2. lists — what to allow / deny (inline; trollbridge mutates this file)
#   3. llm   — which LLM is the advisor
#   4. directives — what the advisor is told (inline multi-line prompt)
#
# See DESIGN.md for the full specification.

trollbridge_version: 3

# 1. Per-surface binds. Each value combines host and port:
#      proxy:   lo:8080         # 127.0.0.1
#      control: 127.0.0.1:8081
#      metrics: 0               # disabled
#    Host aliases:
#      lo  = 127.0.0.1
#      all = 0.0.0.0   (every interface — exposes the surface to the network)
#    Bracket IPv6 literals: "[fd00::1]:8081".
#    The proxy and control may bind to different hosts: e.g. expose
#    the proxy on `all:8080` for sidecars to reach, but keep the
#    controller on `lo:8081` so only operators on the host can drive it.
proxy:   lo:8080
control: lo:8081
metrics: 0

# 2. Allow / deny lists. Each entry is host[:port][/path] with an
#    optional <scheme>:// prefix and * wildcards.
#
#      api.github.com                    exact host
#      *.github.com                      strict subdomain wildcard
#      api.github.com:443                exact port
#      api.github.com/v3                 exact path
#      api.github.com/v3/*               path prefix
#      https://api.github.com/v3/*       scheme + host + path-prefix
#      *                                 any host (use sparingly)
#      127.0.0.1                         IP address
#
#    Trollbridge writes this list back when the operator types
#    `allow X` / `deny X` / `remove X` in the REPL — comments
#    elsewhere in this file survive; entry-level comments inside
#    `lists` are best-effort.
lists:
  allow:
    - localhost
    - 127.0.0.1
  deny:
    - 169.254.169.254
    - metadata.google.internal
    - metadata.azure.com

# 3. LLM — the advisor consulted on ambiguous requests.
#    provider: anthropic   -> Authorization: Bearer <key>     (default)
#    provider: aoai        -> api-key: <key>                   (Azure OpenAI)
#    Other strings fall back to generic Bearer with a startup warning.
#    The wire schema posted to `endpoint` is fixed (DESIGN.md §9);
#    point at a wrapper that speaks it.
llm:
  enabled: false
  provider: anthropic
  model:    claude-opus-4-7
  endpoint: https://api.anthropic.com
  api_key_path: /etc/trollbridge/llm.key
  timeout_seconds: 8
  cache_ttl_seconds: 300
  send_body: false
  on_unavailable: ask_user
  confidence_floor: medium

  # --- Azure OpenAI (AOAI) example -------------------------------
  # To use Azure OpenAI instead of Anthropic, replace the llm block
  # above with the one below. The endpoint is the deployment-scoped
  # chat-completions URL; the api-version is the only Azure-specific
  # query string. Trollbridge sends `api-key: <key>` (not Bearer)
  # automatically when provider is `aoai`.
  #
  # llm:
  #   enabled: true
  #   provider: aoai
  #   model:    <deployment-name>     # the Azure deployment, not the underlying model id
  #   endpoint: https://<resource>.openai.azure.com/openai/deployments/<deployment>/chat/completions?api-version=2024-02-15-preview
  #   api_key_path: /etc/trollbridge/aoai.key
  #   timeout_seconds: 8
  #   cache_ttl_seconds: 300
  #   send_body: false
  #   on_unavailable: ask_user
  #   confidence_floor: medium
  # ---------------------------------------------------------------

  # 4. Directives — the operator's system-prompt content for the
  #    advisor. Sent verbatim with every classification request.
  directives: |
    You are trollbridge's security advisor. For each HTTP request you
    receive, decide allow / deny / ask_user. Refuse anything that
    exfiltrates credentials, contacts cloud metadata services, or
    looks like data exfiltration to an unfamiliar destination. When
    uncertain, answer ask_user with a short reason.

# Controller — operator-facing control plane (approve/deny/tui).
# mTLS is enforced (the only supported mode in v2). Client certs
# are issued by the same CA used for TLS interception:
#
#   trollbridge ca init
#   trollbridge ca client-cert <op-name>
#
# The CLI auto-loads the cert+key from
# ~/.trollbridge/controller-client.{crt,key} (override via
# TROLLBRIDGE_CONTROLLER_CERT / _KEY).
controller:
  auth: mtls
  # client_ca_path: /etc/trollbridge/different-ca.crt  # optional override

mode: default-ask

# Interception — TLS termination for HTTPS visibility. The CA
# configured here is also used by the controller's mTLS listener.
interception:
  enabled: false
  ca:
    cert_path: /etc/trollbridge/trollbridge-ca.crt
    key_path:  /etc/trollbridge/trollbridge-ca.key
  leaf_key_type: rsa-4096
  passthrough_hosts:
    - "*.googleapis.com"
    - login.microsoftonline.com
  leaf_cert_ttl_hours: 24

# Redaction is applied before forward, before LLM input, before
# audit. Defaults below are conservative.
redaction:
  default_modifiers:
    - redact_authorization_header
    - redact_cookie
  body_redactors:
    - jsonpath: $.password
    - jsonpath: $.api_key
    - jsonpath: $.token
    - regex: "(?i)bearer [A-Za-z0-9._-]+"
  query_redactors:
    - regex: "(?i)token|key|secret|password"

logging:
  audit_path: /var/log/trollbridge/audit.jsonl
  audit_buffer_size: 1024
  audit_overflow: deny
  operational_path: stderr

# Approvals queue tuning. (Auth posture lives under controller.)
approvals:
  timeout_seconds: 300
  on_timeout: deny
  max_pending: 100

forwarder:
  max_idle_connections: 256
  max_idle_connections_per_host: 32
  connection_acquire_timeout_seconds: 5

shutdown:
  grace_seconds: 30

# Identities — how clients are recognized at the proxy. Independent
# of how operators authenticate to the controller (mTLS, above).
identities:
  - id: coding-agent
    match:
      mtls_cn: agent.local
  - id: ci-runner
    match:
      bearer_token_sha256: "REPLACE_WITH_SHA256_OF_TOKEN"
  - id: dev-laptop
    match:
      source_ip: 127.0.0.1

# Structured rules for advanced cases. Inline lists cover the simple
# cases; reach for include only when you need time windows, body
# patterns, identity scoping, or ask_user / ask_llm effects.
policy:
  include:
    - rules/base.yaml

upstream:
  proxy: ""
  no_proxy:
    - localhost
    - 127.0.0.1
    - 169.254.169.254

decisioncache:
  ttl_seconds: 60
